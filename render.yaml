services:
  # 1. Django Backend and Telegram Bot (Web Service)
  - type: web
    name: telegram-bot-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: bash ../start.sh
    healthCheckPath: /health/
    envVars:
      - key: DATABASE_URL
        sync: false # Set this to your Neon connection string in Render Dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: telegram-bot-backend.onrender.com
      - key: TELEGRAM_BOT_TOKEN
        sync: false # Set this to your Bot Token in Render Dashboard
      - key: FRONTEND_URL
        sync: false # Set this to your Netlify URL (e.g., https://yourapp.netlify.app)
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.11.0
