  <body>
    <div id="root"></div>
    <script>
      function updateBackground() {
        let path = window.location.pathname;
        // Normalize trailing slashes (e.g., '/login/' -> '/login')
        if (path.length > 1 && path.endsWith('/')) {
          path = path.slice(0, -1);
        }
        
        const shouldHaveHero = (path === '/' || path === '/login' || path === '/register');
        const hasHeroClass = document.body.classList.contains('hero-bg');
        
        if (shouldHaveHero && !hasHeroClass) {
          document.body.classList.add('hero-bg');
        } else if (!shouldHaveHero && hasHeroClass) {
          document.body.classList.remove('hero-bg');
        }
      }
      
      window.addEventListener('popstate', updateBackground);
      const originalPushState = history.pushState;
      history.pushState = function() {
        originalPushState.apply(this, arguments);
        updateBackground();
      };
      const originalReplaceState = history.replaceState;
      history.replaceState = function() {
        originalReplaceState.apply(this, arguments);
        updateBackground();
      };
      
      // Periodically check URL pathname to handle any client-side routing transitions
      setInterval(updateBackground, 100);
      
      updateBackground();

      // --- Global Loader & Fetch Interceptor ---
      function createLoadingOverlay() {
        let overlay = document.getElementById('global-loading-overlay');
        if (!overlay) {
          overlay = document.createElement('div');
          overlay.id = 'global-loading-overlay';
          overlay.className = 'loading-overlay';
          overlay.innerHTML = `
            <div class="loading-card">
              <div class="loading-spinner"></div>
              <div class="loading-text" id="global-loading-text">Authenticating...</div>
              <div class="loading-subtext">Please wait a moment</div>
            </div>
          `;
          document.body.appendChild(overlay);
        }
        return overlay;
      }

      function showLoading(message) {
        const overlay = createLoadingOverlay();
        document.getElementById('global-loading-text').textContent = message || 'Loading...';
        overlay.offsetHeight; // Force reflow
        overlay.classList.add('active');
      }

      function hideLoading() {
        const overlay = document.getElementById('global-loading-overlay');
        if (overlay) {
          overlay.classList.remove('active');
        }
      }

      const originalFetch = window.fetch;
      window.fetch = async function(resource, init) {
        const url = typeof resource === 'string' ? resource : (resource.url || '');
        const method = (init && init.method || 'GET').toUpperCase();
        
        let isLoadingRequest = false;
        if (method === 'POST') {
          if (url.includes('/api/login/')) {
            showLoading('Logging in...');
            isLoadingRequest = true;
          } else if (url.includes('/api/users/')) {
            showLoading('Creating account...');
            isLoadingRequest = true;
          }
        }
        
        try {
          return await originalFetch.apply(this, arguments);
        } finally {
          if (isLoadingRequest) {
            setTimeout(hideLoading, 250); // Add small delay for smooth animation transition
          }
        }
      };
    </script>
